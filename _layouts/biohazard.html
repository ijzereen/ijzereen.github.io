<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko' }}">
<head>
    {% include head.html title=page.title css="base,biohazard" %}
</head>
<body>

<div class="scene">
    <div class="wall"></div>
    <div class="desk">
        <div class="desk-stain stain-1"></div>
        <div class="desk-stain stain-2"></div>
        <div class="desk-stain stain-3"></div>
    </div>

    <div class="obj macbook"
         data-target="{{ '/blog/' | relative_url }}"
         data-name="MACBOOK">
        <span class="label">MACBOOK</span>
        {% include svg/macbook.svg %}
    </div>

    <div class="obj folder"
         data-target="{{ '/portfolio/' | relative_url }}"
         data-name="DOSSIER">
        <span class="label">DOSSIER</span>
        {% include svg/folder.svg %}
    </div>
</div>

<div class="flashlight"></div>
<div class="vignette"></div>
<div class="grain"></div>

<div class="cursor"><span></span></div>

<div class="inspect" id="inspect">
    <div class="inspect-back">ESC</div>
    <div class="inspect-stage" id="inspectStage"></div>
    <div class="inspect-meta">
        <h1 id="inspectName"></h1>
        <p id="inspectDesc"></p>
        <div class="inspect-cta"></div>
    </div>
</div>

<script src="{{ '/assets/js/biohazard.js' | relative_url }}"></script>
</body>
</html>
