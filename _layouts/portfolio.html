<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | escape }} - {{ site.title | escape }}</title>
    <meta name="description" content="{{ site.description | escape }}">
    <link rel="icon" href="{{ '/assets/img/favicons/favicon.ico' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root { --ink: #d8c9a4; --ink-dim: #6b5e44; --warn: #c14a2b; --paper: #ede0b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: #050403;
            color: var(--ink);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
        }
        body {
            background:
                radial-gradient(ellipse at 50% 0%, #1a1410 0%, #050403 70%);
            padding: 0 0 80px;
        }
        a { color: inherit; text-decoration: none; }

        /* 비네팅 */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%);
            pointer-events: none; z-index: 1;
        }

        /* 그레인 */
        body::after {
            content: ""; position: fixed; inset: -50%;
            opacity: 0.05; pointer-events: none; z-index: 2;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        }

        /* 헤더 */
        .top-bar {
            position: sticky; top: 0; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 24px;
            background: rgba(8,6,4,0.85);
            border-bottom: 1px solid #1f1812;
            font-family: 'Special Elite', monospace;
            font-size: 11px; letter-spacing: 4px;
            backdrop-filter: blur(6px);
        }
        .top-bar .back { color: var(--ink); }
        .top-bar .back:hover { color: var(--warn); }
        .top-bar .title { color: #f1e3bd; }
        .top-bar .meta { color: var(--ink-dim); }

        /* 서류 무드의 컨테이너 */
        .dossier {
            position: relative;
            max-width: 880px;
            margin: 60px auto 0;
            padding: 60px 56px;
            background: var(--paper);
            color: #2a2114;
            box-shadow:
                0 0 0 1px #5a4a2a,
                0 30px 80px rgba(0,0,0,0.7),
                inset 0 0 60px rgba(140,110,60,0.15);
            font-family: 'JetBrains Mono', monospace;
            background-image:
                repeating-linear-gradient(0deg, rgba(90,70,40,0.06) 0 1px, transparent 1px 28px),
                radial-gradient(ellipse at 50% 0%, rgba(140,110,60,0.18), transparent 60%);
            z-index: 3;
        }
        .dossier::before {
            content: "CLASSIFIED";
            position: absolute; top: 28px; right: 40px;
            font-family: 'Special Elite', monospace;
            border: 2px solid #a83020; color: #a83020;
            padding: 4px 12px; font-size: 11px; letter-spacing: 6px;
            transform: rotate(6deg);
            opacity: .85;
        }
        .dossier::after {
            content: "DOSSIER · " attr(data-id);
            position: absolute; bottom: 24px; right: 40px;
            font-family: 'Special Elite', monospace;
            font-size: 10px; letter-spacing: 4px;
            color: #5a4a2a; opacity: .7;
        }

        .dossier h1 {
            font-family: 'Special Elite', monospace;
            font-size: 32px; letter-spacing: 8px;
            margin-bottom: 8px;
            color: #2a2114;
        }
        .dossier .subtitle {
            font-size: 12px; letter-spacing: 4px;
            color: #5a4a2a;
            margin-bottom: 36px;
            border-bottom: 1px dashed #5a4a2a;
            padding-bottom: 18px;
        }

        .dossier h2 {
            font-family: 'Special Elite', monospace;
            font-size: 14px; letter-spacing: 6px;
            margin: 32px 0 14px;
            padding-left: 12px;
            border-left: 4px solid #a83020;
            color: #2a2114;
        }
        .dossier p { line-height: 1.8; font-size: 14px; margin-bottom: 12px; }
        .dossier ul { padding-left: 20px; margin-bottom: 16px; }
        .dossier li { line-height: 1.8; font-size: 13px; margin-bottom: 4px; }
        .dossier strong { color: #6a1818; }
        .dossier a { color: #6a1818; border-bottom: 1px solid #6a1818; }
        .dossier code {
            background: rgba(90,70,40,0.18);
            padding: 1px 6px;
            font-size: 12px;
        }

        /* 필드 라인 */
        .field {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 16px;
            padding: 8px 0;
            border-bottom: 1px dotted rgba(90,70,40,0.4);
            font-size: 13px;
        }
        .field .k { color: #5a4a2a; letter-spacing: 2px; font-size: 11px; }
        .field .v { color: #2a2114; }

        @media (max-width: 720px) {
            .dossier { margin: 30px 16px 0; padding: 40px 24px; }
            .dossier h1 { font-size: 22px; letter-spacing: 4px; }
            .dossier::before { top: 14px; right: 16px; padding: 2px 8px; font-size: 9px; }
            .field { grid-template-columns: 100px 1fr; gap: 8px; }
        }
    </style>
</head>
<body>

<header class="top-bar">
    <a class="back" href="{{ '/' | relative_url }}">← BACK TO ROOM</a>
    <span class="title">DOSSIER</span>
    <span class="meta">FILE #{{ site.author | upcase }}-001</span>
</header>

<article class="dossier" data-id="{{ site.author | upcase }}-001">
    {{ content }}
</article>

</body>
</html>
