        <rect x="80" y="66" width="180" height="2" fill="#3a4a3a" opacity=".6"/>
        <rect x="80" y="74" width="120" height="2" fill="#3a4a3a" opacity=".4"/>
        <rect x="80" y="86" width="60"  height="2" fill="#7a8a6a" opacity=".5"/>
