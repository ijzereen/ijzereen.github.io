{%- comment -%} 문서 너비 조절 Tweak — 값은 localStorage('docWidth')에 저장, --doc-width 로 적용 {%- endcomment -%}
<div class="width-tweak">
    <button class="wt-toggle" type="button" aria-label="문서 너비 조절" title="문서 너비 조절">⇆</button>
    <div class="wt-panel" hidden>
        <div class="wt-head">
            <span>문서 너비</span>
            <span class="wt-val"></span>
        </div>
        <input class="wt-range" type="range" min="640" max="1200" step="20">
        <button class="wt-reset" type="button">기본값으로</button>
    </div>
</div>
<script>
(function () {
    var root   = document.documentElement;
    var wrap   = document.querySelector('.width-tweak');
    if (!wrap) return;
    var toggle = wrap.querySelector('.wt-toggle');
    var panel  = wrap.querySelector('.wt-panel');
    var range  = wrap.querySelector('.wt-range');
    var val    = wrap.querySelector('.wt-val');
    var reset  = wrap.querySelector('.wt-reset');
    var DEFAULT = 760;

    function read()  { try { return localStorage.getItem('docWidth'); } catch (e) { return null; } }
    function label(v){ val.textContent = v ? v + 'px' : '기본'; }

    var saved = read();
    range.value = saved || DEFAULT;
    label(saved ? parseInt(saved, 10) : 0);

    range.addEventListener('input', function () {
        var v = range.value;
        root.style.setProperty('--doc-width', v + 'px');
        try { localStorage.setItem('docWidth', v); } catch (e) {}
        label(parseInt(v, 10));
    });
    reset.addEventListener('click', function () {
        root.style.removeProperty('--doc-width');
        try { localStorage.removeItem('docWidth'); } catch (e) {}
        range.value = DEFAULT;
        label(0);
    });
    toggle.addEventListener('click', function () {
        panel.hidden = !panel.hidden;
        wrap.classList.toggle('open', !panel.hidden);
    });
    document.addEventListener('click', function (e) {
        if (!panel.hidden && !wrap.contains(e.target)) {
            panel.hidden = true;
            wrap.classList.remove('open');
        }
    });
})();
</script>
